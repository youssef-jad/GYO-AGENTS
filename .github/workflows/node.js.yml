# This workflow validates the MCP server build across multiple Node.js versions

name: MCP Server CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mcp-server

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: mcp-server/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Build TypeScript
      run: npm run build

    - name: Verify MCP server starts
      run: |
        timeout 5s node dist/index.js || code=$?
        # MCP servers exit when stdin closes — exit code 1 (timeout) is acceptable
        if [ "${code:-0}" -ne 124 ] && [ "${code:-0}" -ne 0 ] && [ "${code:-0}" -ne 1 ]; then
          echo "MCP server exited unexpectedly with code $code"
          exit 1
        fi
        echo "MCP server started successfully"
